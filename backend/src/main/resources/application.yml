# ===== Server Configuration =====
server:
  port: 8080
  servlet:
    context-path: /

# ===== Spring DataSource (MySQL) =====
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456 # 改为你的密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # ===== Redis Configuration =====
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # ===== Servlet Multipart (file upload) =====
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# ===== Elasticsearch Configuration =====
es:
  host: localhost
  port: 9200
  username: elastic
  password: 123456   # 改为你的 Elasticsearch 密码

# ===== MyBatis-Plus Configuration =====
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.agent.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

# ===== JWT Configuration =====
jwt:
  secret: my-very-secure-secret-key-with-more-than-32-chars-123!
  expiration: 86400

# ===== LangChain4j OpenAI Configuration =====
langchain4j:
  open-ai:
    api-key: # 改为你的
    base-url: # 改为你的
    model-name: # 改为你的
    embedding-model-name: # 改为你的

# ===== SpringDoc / Swagger Configuration =====
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.agent.api.controller

# ===== Logging Configuration =====
logging:
  level:
    com.agent: debug
    org.springframework.web: info
    org.springframework.security: info
    co.elastic.clients: warn
    org.apache.ibatis: warn
